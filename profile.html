<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - QuickClips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #000; color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .profile-container { width: 100%; max-width: 450px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; }
        .logout-btn { background: none; border: none; color: #fe2c55; font-size: 16px; cursor: pointer; }
        .profile-info { text-align: center; margin-bottom: 30px; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background: #333; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 40px; color: #888; }
        .username { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .bio { color: #888; font-size: 14px; margin-bottom: 15px; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 18px; font-weight: 700; }
        .stat-label { font-size: 12px; color: #888; }
        .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .video-item { aspect-ratio: 9/16; background: #222; border-radius: 5px; overflow: hidden; position: relative; }
        .video-item video { width: 100%; height: 100%; object-fit: cover; }
        .video-views { position: absolute; bottom: 5px; left: 5px; font-size: 12px; text-shadow: 1px 1px 2px #000; }
        .loading { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <h1>Profile</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <div class="profile-info">
            <div class="profile-pic" id="profilePic"><i class="fas fa-user"></i></div>
            <div class="username" id="username">@username</div>
            <div class="bio" id="bio">No bio yet</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="followingCount">0</div>
                    <div class="stat-label">Following</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="followersCount">0</div>
                    <div class="stat-label">Followers</div>
                </div>                <div class="stat">
                    <div class="stat-value" id="likesCount">0</div>
                    <div class="stat-label">Likes</div>
                </div>
            </div>
        </div>

        <div class="video-grid" id="videoGrid">
            <div class="loading">Loading videos...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script>
        const user = auth.currentUser;
        if (!user) { window.location.href = 'login.html'; }

        // Load Profile Data
        async function loadProfile() {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('username').innerText = data.username || '@user';
                document.getElementById('bio').innerText = data.bio || 'No bio yet';
                document.getElementById('followersCount').innerText = data.followersCount || 0;
                document.getElementById('followingCount').innerText = data.followingCount || 0;
                document.getElementById('likesCount').innerText = data.likesCount || 0;
            }
            loadUserVideos();
        }

        // Load User Videos
        async function loadUserVideos() {
            const grid = document.getElementById('videoGrid');
            const snapshot = await db.collection('videos').where('userId', '==', user.uid).orderBy('createdAt', 'desc').get();
            
            if (snapshot.empty) {
                grid.innerHTML = '<div class="loading">No videos yet</div>';
                return;
            }

            grid.innerHTML = '';
            snapshot.forEach(doc => {
                const video = doc.data();
                const item = document.createElement('div');
                item.classList.add('video-item');
                item.innerHTML = `                    <video src="${video.videoURL}" muted></video>
                    <div class="video-views"><i class="fas fa-play"></i> ${video.viewsCount || 0}</div>
                `;
                grid.appendChild(item);
            });
        }

        loadProfile();
    </script>
</body>
</html>
