<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - QuickClips</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #000; color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .upload-container { width: 100%; max-width: 450px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; }
        .back-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .upload-area { border: 2px dashed #333; border-radius: 10px; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-area:hover { border-color: #fe2c55; }
        .upload-area i { font-size: 48px; color: #888; margin-bottom: 15px; }
        .preview-video { width: 100%; border-radius: 10px; margin-bottom: 20px; display: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #888; }
        .form-group input, .form-group textarea { width: 100%; padding: 15px; background: #111; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; }
        .form-group textarea { resize: none; height: 100px; }
        .btn { width: 100%; padding: 15px; background: #fe2c55; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .progress-bar { width: 100%; height: 5px; background: #333; border-radius: 5px; margin-top: 20px; display: none; }
        .progress-fill { height: 100%; background: #fe2c55; border-radius: 5px; width: 0%; transition: width 0.3s; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
            <h1>Upload Video</h1>
            <div style="width: 24px;"></div>
        </div>

        <div class="upload-area" id="uploadArea">
            <i class="fas fa-video"></i>
            <p>Tap to select video</p>
            <p style="color: #666; font-size: 12px; margin-top: 10px;">Max 60 seconds, MP4 format</p>
        </div>

        <video class="preview-video" id="previewVideo" controls></video>

        <form id="uploadForm">
            <div class="form-group">
                <label>Caption</label>
                <textarea id="caption" placeholder="Write a caption..." maxlength=150></textarea>
            </div>
            <div class="form-group">
                <label>Hashtags</label>
                <input type="text" id="hashtags" placeholder="#trending #viral">
            </div>
            <button type="submit" class="btn" id="uploadBtn" disabled>Upload Video</button>
        </form>

        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-msg" id="statusMsg"></div>
    </div>

    <input type="file" id="videoInput" accept="video/*" style="display: none;">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/upload.js"></script>
</body>
</html>
